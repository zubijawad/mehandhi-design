<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mehndi Design Post</title>
<style>
    body{
        margin:0;
        font-family: Arial, sans-serif;
        background:#f0f2f5;
    }

    /* Top Facebook Bar */
    .topbar{
        background:white;
        padding:10px 20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        border-bottom:1px solid #ddd;
    }

    .logo{
        color:#1877f2;
        font-size:28px;
        font-weight:bold;
    }

    .login-box input{
        padding:8px;
        margin:0 5px;
        border:1px solid #ccc;
        border-radius:5px;
    }

    .login-box button{
        background:#1877f2;
        color:white;
        border:none;
        padding:8px 12px;
        border-radius:5px;
        cursor:pointer;
    }

    /* Modal */
    .modal{
        width:700px;
        margin:30px auto;
        background:white;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        overflow:hidden;
    }

    .modal-header{
        padding:10px;
        text-align:center;
        font-weight:bold;
        border-bottom:1px solid #ddd;
        position:relative;
    }

    .close{
        position:absolute;
        right:10px;
        top:5px;
        font-size:20px;
        cursor:pointer;
    }

    .post-header{
        display:flex;
        align-items:center;
        padding:10px;
        gap:10px;
    }

    .avatar{
        width:40px;
        height:40px;
        border-radius:50%;
        background:#ccc;
    }

    .post-info{
        font-size:14px;
    }

    .post-info b{
        display:block;
    }

    .images{
        display:flex;
        gap:10px;
        padding:10px;
    }

    .images img{
        width:50%;
        border-radius:10px;
        object-fit:cover;
    }

</style>
</head>
<body>

<div class="topbar">
    <div class="logo">facebook</div>
    <div class="login-box">
        <input type="text" placeholder="Email or phone">
        <input type="password" placeholder="Password">
        <button>Log in</button>
    </div>
</div>

<div class="modal">

    <div class="modal-header">
        Simple Mehndi Design's post
        <span class="close">×</span>
    </div>

    <div class="post-header">
        <div class="avatar"></div>
        <div class="post-info">
            <b>Simple Mehndi Design</b>
            28 June 2024
        </div>
    </div>

    <div class="post-info" style="padding:0 10px;">
        <p><b>Simple Mehndi Design</b></p>
        <p>Website: simplemehndidesign.xyz</p>
    </div>

    <div class="images">
        <img src="mehandhi 1.jpg">
        <img src="mehandhi 2.jpg">
    </div>

</div>

</body>
</html>

    
</body>
<script src="app.js"></script>
</html>
